<div class="row mt-3 mb-3">
  <a [routerLink]="'/'" class="btn btn-primary">
    <i class="fa-solid fa-chevron-left"></i>Elenco
  </a>
</div>
@if(car){
  <div class="d-flex gap-5">
    <h3>Dettaglio</h3>
    <a [routerLink]="'/car/' + carId + '/edit'" class="btn btn-warning">Modifica</a>
  </div>
}

@if(message){
  <div class="alert alert-danger" role="alert">
    {{ message }}
  </div>
}
@if(car){
  <div class="card" style="width: 18rem;">
    <img src="{{car.immagine}}" class="card-img-top" alt="...">
    <div class="card-body">
      <h5 class="card-title">{{car.marca}}</h5>
      <p class="card-text">{{car.modello}}</p>
      @if(car.targa)
      {
        <p class="card-text">{{car.targa}}</p>
      }@else{
        <p class="card-text"></p>
      }
      <p class="card-text">{{car.colore}}</p>
      <p class="card-text">Anno: {{car.anno}}</p>
      <p class="card-text">Km: {{car.km}}</p>
      <p class="card-text">{{car.disponibile ? 'Disponibile' : 'Non disponibile'}}</p>
    </div>
  </div>
}
@else{
<div class="spinner-border" role="status">
  <span class="visually-hidden">Loading...</span>
</div>
}
